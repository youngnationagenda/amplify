name: Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test --workspace=apps/nettribexyz

      - name: Generate amplify_outputs.json placeholder
        run: echo '{}' > apps/nettribexyz/amplify_outputs.json

      - name: Build nettribexyz
        run: npm run build --workspace=apps/nettribexyz
