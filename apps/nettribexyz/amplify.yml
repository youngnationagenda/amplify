# NOTE: This file is NOT used by Amplify Console for monorepo builds.
# The root-level amplify.yml (with appRoot: apps/nettribexyz) is the active config.
# This file is kept for reference only.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - node -v
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
