name: Deploy & Verify — Celo Sepolia

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip deploy, only verify"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm compile

      - name: Run tests
        run: npx hardhat test

  deploy-and-verify:
    runs-on: ubuntu-latest
    needs: test
    environment: celo-sepolia

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm compile

      - name: Deploy factory + periphery
        if: ${{ !inputs.skip_deploy }}
        run: bash scripts/deploy-all.sh
        env:
          CELO_RPC_URL: ${{ secrets.CELO_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          WRAPPED_NATIVE_TOKEN: ${{ secrets.WRAPPED_NATIVE_TOKEN }}
          NATIVE_CURRENCY_LABEL: CELO

      - name: Verify deployments
        run: pnpm verify
        env:
          CELO_RPC_URL: ${{ secrets.CELO_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: deployed-addresses.json
